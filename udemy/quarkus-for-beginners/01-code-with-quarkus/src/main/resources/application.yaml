quarkus:
  http:
    port: 8080

  smallrye-openapi:
    enabled: true
    path: /openapi
    title: Games, games, games
    description: API documentation for Games
    version: 1.0.0

  datasource:
    db-kind: postgresql
    username: postgres
    password: postgres
    jdbc:
      url: jdbc:postgresql://localhost:5432/postgres
      max-size: 16

  flyway:
    migrate-at-start: true
    schemas: public
    locations: classpath:db/migration
